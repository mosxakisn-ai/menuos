services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-menuos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-menuos}
      POSTGRES_DB: ${POSTGRES_DB:-menuos}
    ports:
      - "${DATABASE_PORT:-5433}:5432"
    volumes:
      - menuos_pg_data:/var/lib/postgresql/data

volumes:
  menuos_pg_data:
