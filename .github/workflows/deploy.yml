name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-menuos-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/menuos"
            cd "$APP_DIR"
            chmod +x scripts/*.sh 2>/dev/null || true
            git config --global --add safe.directory "$APP_DIR" 2>/dev/null || true
            if [ ! -d .git ]; then
              echo "No git repo — adopting in place (HTTPS)..."
              APP_DIR="$APP_DIR" bash scripts/server-git-adopt.sh
            else
              git remote set-url origin https://github.com/mosxakisn-ai/menuos.git
            fi
            PREV="$(git rev-parse HEAD)"
            git fetch origin main
            git reset --hard origin/main
            if git diff --name-only "$PREV" HEAD | grep -qE '^packages/db/prisma/schema\.prisma'; then
              RUN_DB_PUSH=1
              echo "Schema changed — prisma db push will run"
            else
              RUN_DB_PUSH=0
              echo "No schema changes — skipping db push"
            fi
            chmod +x scripts/server-deploy.sh
            APP_DIR="$APP_DIR" RUN_DB_PUSH="$RUN_DB_PUSH" bash scripts/server-deploy.sh
