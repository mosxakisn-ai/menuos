name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-menuos-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          timeout: 30m
          command_timeout: 25m
          script: |
            set -euo pipefail
            APP_DIR="/opt/menuos"
            cd "$APP_DIR"
            chmod +x scripts/*.sh 2>/dev/null || true
            git config --global --add safe.directory "$APP_DIR" 2>/dev/null || true
            if [ ! -d .git ]; then
              echo "No git repo — adopting in place (HTTPS)..."
              APP_DIR="$APP_DIR" bash scripts/server-git-adopt.sh
            else
              git remote set-url origin https://github.com/mosxakisn-ai/menuos.git
            fi
            git fetch origin main
            git reset --hard origin/main
            echo "Deployed commit: $(git rev-parse --short HEAD)"
            chmod +x scripts/sync-all.sh scripts/server-deploy.sh scripts/fix-production.sh
            APP_DIR="$APP_DIR" RUN_DB_PUSH=1 bash scripts/sync-all.sh
