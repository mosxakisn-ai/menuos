name: menuos

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: menuos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: menuos
    volumes:
      - menuos_pgdata:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - menuos-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menuos"]
      interval: 5s
      retries: 5

  menuos-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://menuos:${POSTGRES_PASSWORD:-}@menuos-db:5432/menuos
      APP_URL: https://menuos.gr
      NEXTAUTH_URL: https://menuos.gr
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_ENV: production
      MENUOS_STRIPE_SECRET_KEY: ${MENUOS_STRIPE_SECRET_KEY:-}
      MENUOS_STRIPE_WEBHOOK_SECRET: ${MENUOS_STRIPE_WEBHOOK_SECRET:-}
      MENUOS_NOTIFY_EMAIL: ${MENUOS_NOTIFY_EMAIL:-info@b-os.gr}
      MAILBOX_PASSWORD: ${MAILBOX_PASSWORD:-}
      MAILBOX_USER: ${MAILBOX_USER:-admin@s1cloud.b-os.gr}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-MenuOS <admin@s1cloud.b-os.gr>}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - matchwork_proxy

networks:
  matchwork_proxy:
    external: true
    name: matchwork_default

volumes:
  menuos_pgdata:
