name: menuos

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: menuos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: menuos
    volumes:
      - menuos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menuos"]
      interval: 5s
      retries: 5

  menuos-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://menuos:${POSTGRES_PASSWORD}@postgres:5432/menuos
      APP_URL: https://menuos.gr
      NEXTAUTH_URL: https://menuos.gr
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - matchwork_proxy

networks:
  matchwork_proxy:
    external: true
    name: matchwork_default

volumes:
  menuos_pgdata:
