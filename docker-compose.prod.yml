name: menuos

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-menuos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-menuos}
    volumes:
      - menuos_pgdata:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - menuos-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-menuos} -d ${POSTGRES_DB:-menuos}"]
      interval: 5s
      retries: 5

  menuos-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PHOTO_UPLOAD_DIR: /app/data/uploads
    volumes:
      - ./data/uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - matchwork_proxy

networks:
  matchwork_proxy:
    external: true
    name: matchwork_default

volumes:
  menuos_pgdata:
